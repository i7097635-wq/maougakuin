<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-white text-gray-900 min-h-screen flex flex-col font-sans">

  <!-- ヘッダー検索エリア -->
  <header class="border-b p-4 flex flex-col sm:flex-row justify-between items-center gap-3">
    <h1 class="text-lg font-bold cursor-pointer" onclick="location.hash=''; loadNotes(); showDefaultView();">Wiki</h1>
    <div class="w-full sm:w-2/3 flex gap-2">
      <!-- タイトル検索 -->
      <input type="text" id="titleSearchInput" placeholder="タイトルで探す..." class="w-1/2 border px-3 py-1.5 text-sm rounded focus:outline-none focus:border-black" oninput="searchByTitle(this.value)">
      <!-- 全文検索 -->
      <input type="text" id="fullSearchInput" placeholder="本文全文から探す..." class="w-1/2 border px-3 py-1.5 text-sm rounded focus:outline-none focus:border-black" oninput="searchByFullText(this.value)">
      <button onclick="openEditor()" class="bg-black text-white px-4 py-1.5 text-sm rounded hover:bg-gray-800 whitespace-nowrap">+ 新規</button>
    </div>
  </header>

  <!-- メインレイアウト -->
  <main class="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-4 gap-6">
    
    <!-- サイドバー: ノート一覧 -->
    <aside class="md:col-span-1 border-r pr-4 flex flex-col gap-2">
      <div class="text-xs font-bold text-gray-500 uppercase tracking-wider">ノート一覧</div>
      <ul id="notesList" class="space-y-1 overflow-y-auto max-h-[70vh] text-sm">
        <!-- 動的読込 -->
      </ul>
    </aside>

    <!-- メイン表示・編集エリア -->
    <section class="md:col-span-3 flex flex-col gap-4">
      
      <!-- 閲覧モード -->
      <div id="viewMode" class="space-y-4">
        <div class="flex justify-between items-start border-b pb-3">
          <h2 id="viewTitle" class="text-2xl font-bold"></h2>
          <div class="flex gap-2">
            <button id="editBtn" class="border px-3 py-1 text-xs rounded hover:bg-gray-100 hidden" onclick="switchToEdit()">編集</button>
            <button id="copyLinkBtn" class="border px-3 py-1 text-xs rounded hover:bg-gray-100 hidden" onclick="copyNoteLink()">リンクコピー</button>
          </div>
        </div>

        <!-- 目次 -->
        <div id="tocContainer" class="bg-gray-50 p-3 text-xs hidden">
          <div class="font-bold text-gray-600 mb-1">目次</div>
          <ul id="tocList" class="space-y-0.5 text-blue-600"></ul>
        </div>

        <div id="viewBody" class="prose max-w-none text-sm leading-relaxed">
          ノートを選択してください。
        </div>
      </div>

      <!-- 編集 / 作成モード -->
      <div id="editMode" class="space-y-3 hidden">
        <input type="hidden" id="editId">
        <div>
          <label class="block text-xs font-bold text-gray-500 mb-1">タイトル</label>
          <input type="text" id="formTitle" class="w-full border px-3 py-1.5 text-sm rounded focus:outline-none focus:border-black" placeholder="タイトルを入力">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 mb-1">スラッグ（URLリンク用ID: 半角英数字とハイフン。例: sample-note）</label>
          <input type="text" id="formSlug" class="w-full border px-3 py-1.5 text-sm rounded font-mono focus:outline-none focus:border-black" placeholder="url-slug">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 mb-1">本文 (Markdown形式 / `## 見出し` で目次が自動生成されます)</label>
          <textarea id="formContent" rows="14" class="w-full border px-3 py-1.5 text-sm rounded font-mono focus:outline-none focus:border-black" placeholder="本文..."></textarea>
        </div>
        <div class="flex justify-end gap-2">
          <button onclick="cancelEdit()" class="border px-4 py-1.5 text-sm rounded hover:bg-gray-100">キャンセル</button>
          <button onclick="saveNote()" class="bg-black text-white px-4 py-1.5 text-sm rounded hover:bg-gray-800">保存</button>
        </div>
      </div>

    </section>
  </main>

  <script>
    // --- ご自身のSupabase情報に書き換えてください ---
    const SUPABASE_URL = 'https://YOUR_SUPABASE_PROJECT_ID.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentNote = null;
    let allNotesCache = [];

    window.addEventListener('DOMContentLoaded', () => {
      initApp();
      setupRealtimeSync();
    });

    async function initApp() {
      await loadNotes();
      const hash = window.location.hash.substring(1);
      if (hash) {
        loadNoteBySlug(hash);
      }
    }

    // ノート一覧の取得とキャッシュ
    async function loadNotes() {
      const { data, error } = await supabaseClient
        .from('notes')
        .select('id, title, slug, updated_at')
        .order('title', { ascending: true });

      if (error) {
        console.error(error);
        return;
      }
      allNotesCache = data || [];
      renderNotesList(allNotesCache);
    }

    function renderNotesList(notes) {
      const listEl = document.getElementById('notesList');
      if (!notes.length) {
        listEl.innerHTML = '<li class="text-gray-400 text-xs">ノートなし</li>';
        return;
      }
      listEl.innerHTML = notes.map(note => `
        <li>
          <a href="#${note.slug}" onclick="loadNoteBySlug('${note.slug}')" class="text-blue-600 hover:underline block truncate py-0.5">
            ${escapeHtml(note.title)}
          </a>
        </li>
      `).join('');
    }

    // 1. タイトルによる絞り込み検索（インメモリ）
    function searchByTitle(query) {
      const q = query.trim().toLowerCase();
      if (!q) {
        renderNotesList(allNotesCache);
        return;
      }
      const filtered = allNotesCache.filter(n => n.title.toLowerCase().includes(q));
      renderNotesList(filtered);
    }

    // 2. 本文の全文検索（Supabase Full-Text Search）
    async function searchByFullText(query) {
      const q = query.trim();
      if (!q) {
        loadNotes();
        return;
      }
      const { data, error } = await supabaseClient
        .from('notes')
        .select('id, title, slug')
        .textSearch('search_vector', q);

      if (error) {
        console.error(error);
        return;
      }
      renderNotesList(data || []);
    }

    // スラッグ指定でノート読み込み
    async function loadNoteBySlug(slug) {
      const { data, error } = await supabaseClient
        .from('notes')
        .select('*')
        .eq('slug', slug)
        .single();

      if (error || !data) {
        return;
      }

      currentNote = data;
      document.getElementById('viewTitle').textContent = data.title;
      document.getElementById('viewBody').innerHTML = marked.parse(data.content);
      document.getElementById('editBtn').classList.remove('hidden');
      document.getElementById('copyLinkBtn').classList.remove('hidden');
      
      renderToc(data.headings);

      document.getElementById('viewMode').classList.remove('hidden');
      document.getElementById('editMode').classList.add('hidden');
    }

    function showDefaultView() {
      currentNote = null;
      document.getElementById('viewTitle').textContent = '';
      document.getElementById('viewBody').textContent = 'ノートを選択してください。';
      document.getElementById('editBtn').classList.add('hidden');
      document.getElementById('copyLinkBtn').classList.add('hidden');
      document.getElementById('tocContainer').classList.add('hidden');
      document.getElementById('viewMode').classList.remove('hidden');
      document.getElementById('editMode').classList.add('hidden');
    }

    // 見出し抽出
    function extractHeadings(content) {
      const regex = /^(#{1,6})\s+(.+)$/gm;
      let match;
      let headings = [];
      while ((match = regex.exec(content)) !== null) {
        headings.push({ level: match[1].length, text: match[2] });
      }
      return headings;
    }

    function renderToc(headings) {
      const tocContainer = document.getElementById('tocContainer');
      const tocList = document.getElementById('tocList');
      if (!headings || headings.length === 0) {
        tocContainer.classList.add('hidden');
        return;
      }
      tocContainer.classList.remove('hidden');
      tocList.innerHTML = headings.map(h => `<li style="margin-left: ${(h.level - 1) * 10}px;">- ${escapeHtml(h.text)}</li>`).join('');
    }

    function openEditor() {
      document.getElementById('editId').value = '';
      document.getElementById('formTitle').value = '';
      document.getElementById('formSlug').value = '';
      document.getElementById('formContent').value = '';

      document.getElementById('viewMode').classList.add('hidden');
      document.getElementById('editMode').classList.remove('hidden');
    }

    function switchToEdit() {
      if (!currentNote) return;
      document.getElementById('editId').value = currentNote.id;
      document.getElementById('formTitle').value = currentNote.title;
      document.getElementById('formSlug').value = currentNote.slug;
      document.getElementById('formContent').value = currentNote.content;

      document.getElementById('viewMode').classList.add('hidden');
      document.getElementById('editMode').classList.remove('hidden');
    }

    function cancelEdit() {
      if (currentNote) {
        loadNoteBySlug(currentNote.slug);
      } else {
        showDefaultView();
      }
    }

    async function saveNote() {
      const id = document.getElementById('editId').value;
      const title = document.getElementById('formTitle').value.trim();
      const slug = document.getElementById('formSlug').value.trim();
      const content = document.getElementById('formContent').value;
      const headings = extractHeadings(content);

      if (!title || !slug || !content) {
        alert('タイトル、スラッグ、本文はすべて必須です。');
        return;
      }

      const payload = { title, slug, content, headings };
      let error;

      if (id) {
        const res = await supabaseClient.from('notes').update(payload).eq('id', id);
        error = res.error;
      } else {
        const res = await supabaseClient.from('notes').insert([payload]);
        error = res.error;
      }

      if (error) {
        alert('保存エラー: ' + error.message);
        return;
      }

      window.location.hash = slug;
      await loadNotes();
      loadNoteBySlug(slug);
    }

    // リアルタイム同期
    function setupRealtimeSync() {
      supabaseClient
        .channel('public:notes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'notes' }, async payload => {
          await loadNotes();
          if (currentNote && payload.new && payload.new.id === currentNote.id) {
            loadNoteBySlug(payload.new.slug);
          }
        })
        .subscribe();
    }

    function copyNoteLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        alert('リンクをコピーしました');
      });
    }

    function escapeHtml(str) {
      return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
  </script>
</body>
</html>
