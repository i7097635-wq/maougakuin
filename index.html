<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-white text-gray-900 min-h-screen flex flex-col font-sans">

  <!-- ヘッダー -->
  <header class="border-b px-4 py-3 flex justify-between items-center bg-white sticky top-0 z-10">
    <h1 class="text-base font-bold cursor-pointer" onclick="showListView()">Wiki</h1>
    <button onclick="openEditor()" class="bg-black text-white px-3 py-1.5 text-xs rounded font-medium">+ 新規ノート</button>
  </header>

  <!-- メイン領域 -->
  <main class="flex-1 max-w-3xl w-full mx-auto p-4 flex flex-col gap-4">

    <!-- 1. 一覧ページ -->
    <div id="listView" class="space-y-4">
      <div class="flex gap-2">
        <input type="text" id="titleSearchInput" placeholder="タイトルで探す..." class="w-1/2 border px-3 py-2 text-sm rounded focus:outline-none focus:border-black" oninput="searchByTitle(this.value)">
        <input type="text" id="fullSearchInput" placeholder="全文から探す..." class="w-1/2 border px-3 py-2 text-sm rounded focus:outline-none focus:border-black" oninput="searchByFullText(this.value)">
      </div>
      <ul id="notesList" class="divide-y divide-gray-100 border-t border-b">
        <!-- 動的読込 -->
      </ul>
    </div>

    <!-- 2. 詳細閲覧ページ -->
    <div id="detailView" class="space-y-4 hidden">
      <button onclick="showListView()" class="text-xs text-gray-500 hover:text-black mb-2">&larr; 一覧に戻る</button>
      <div class="flex justify-between items-start border-b pb-3">
        <h2 id="viewTitle" class="text-xl font-bold"></h2>
        <div class="flex gap-2">
          <button onclick="switchToEdit()" class="border px-3 py-1 text-xs rounded hover:bg-gray-100">編集</button>
        </div>
      </div>
      <!-- 目次 / 折り畳み目次 -->
      <div id="tocContainer" class="bg-gray-50 p-3 text-xs rounded hidden">
        <div class="font-bold text-gray-600 mb-1">目次</div>
        <ul id="tocList" class="space-y-1 text-blue-600"></ul>
      </div>
      <div id="viewBody" class="prose max-w-none text-sm leading-relaxed overflow-x-auto">
        <!-- 本文 -->
      </div>
    </div>

    <!-- 3. 編集 / 作成ページ -->
    <div id="editView" class="space-y-4 hidden">
      <button onclick="cancelEdit()" class="text-xs text-gray-500 hover:text-black mb-2">&larr; 戻る</button>
      <input type="hidden" id="editId">
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">タイトル</label>
        <input type="text" id="formTitle" class="w-full border px-3 py-2 text-sm rounded focus:outline-none focus:border-black" placeholder="タイトル">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">スラッグ（半角英数字とハイフン: 例 sample-note）</label>
        <input type="text" id="formSlug" class="w-full border px-3 py-2 text-sm rounded font-mono focus:outline-none focus:border-black" placeholder="url-slug">
      </div>
      <div>
        <div class="flex justify-between items-center mb-1">
          <label class="text-xs font-bold text-gray-500">本文 (Markdown)</label>
          <!-- スマホでも簡単に使える折り畳み見出し挿入ボタン -->
          <button type="button" onclick="insertDetailsTag()" class="bg-gray-100 hover:bg-gray-200 border px-2 py-0.5 text-xs rounded text-gray-700">＋ 折り畳み見出し</button>
        </div>
        <textarea id="formContent" rows="16" class="w-full border px-3 py-2 text-sm rounded font-mono focus:outline-none focus:border-black" placeholder="長文はこちらに..."></textarea>
      </div>
      <div class="flex justify-end gap-2 pb-8">
        <button onclick="cancelEdit()" class="border px-4 py-2 text-sm rounded hover:bg-gray-100">キャンセル</button>
        <button onclick="saveNote()" class="bg-black text-white px-4 py-2 text-sm rounded hover:bg-gray-800">保存</button>
      </div>
    </div>

  </main>

  <script>
    const SUPABASE_URL = 'https://YOUR_SUPABASE_PROJECT_ID.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentNote = null;
    let allNotesCache = [];

    window.addEventListener('DOMContentLoaded', () => {
      initApp();
      setupRealtimeSync();
    });

    async function initApp() {
      await loadNotes();
      const hash = window.location.hash.substring(1);
      if (hash) {
        loadNoteBySlug(hash);
      } else {
        showListView();
      }
    }

    async function loadNotes() {
      const { data, error } = await supabaseClient
        .from('notes')
        .select('id, title, slug, updated_at')
        .order('title', { ascending: true });

      if (error) return;
      allNotesCache = data || [];
      renderNotesList(allNotesCache);
    }

    function renderNotesList(notes) {
      const listEl = document.getElementById('notesList');
      if (!notes.length) {
        listEl.innerHTML = '<li class="py-3 text-gray-400 text-xs text-center">ノートがありません</li>';
        return;
      }
      listEl.innerHTML = notes.map(note => `
        <li>
          <a href="#${note.slug}" onclick="loadNoteBySlug('${note.slug}')" class="block py-3 px-2 hover:bg-gray-50 truncate text-sm font-medium">
            ${escapeHtml(note.title)}
          </a>
        </li>
      `).join('');
    }

    function searchByTitle(query) {
      const q = query.trim().toLowerCase();
      if (!q) {
        renderNotesList(allNotesCache);
        return;
      }
      renderNotesList(allNotesCache.filter(n => n.title.toLowerCase().includes(q)));
    }

    async function searchByFullText(query) {
      const q = query.trim();
      if (!q) {
        loadNotes();
        return;
      }
      const { data } = await supabaseClient
        .from('notes')
        .select('id, title, slug')
        .textSearch('search_vector', q);
      renderNotesList(data || []);
    }

    async function loadNoteBySlug(slug) {
      const { data, error } = await supabaseClient
        .from('notes')
        .select('*')
        .eq('slug', slug)
        .single();

      if (error || !data) return;

      currentNote = data;
      document.getElementById('viewTitle').textContent = data.title;
      
      // Markdown変換（リンクやHTMLタグ対応）
      let parsedHtml = marked.parse(data.content);
      document.getElementById('viewBody').innerHTML = parsedHtml;

      // ノート内リンク（#slug）の自動クリック対応
      setupInternalLinks();

      renderToc(data.headings);

      document.getElementById('listView').classList.add('hidden');
      document.getElementById('editView').classList.add('hidden');
      document.getElementById('detailView').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function showListView() {
      currentNote = null;
      window.location.hash = '';
      document.getElementById('detailView').classList.add('hidden');
      document.getElementById('editView').classList.add('hidden');
      document.getElementById('listView').classList.remove('hidden');
    }

    // 本文内のハッシュリンク（#slug）をクリックしたときに別ノートを開く処理
    function setupInternalLinks() {
      const bodyEl = document.getElementById('viewBody');
      bodyEl.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (href && href.startsWith('#')) {
          a.onclick = (e) => {
            e.preventDefault();
            const slug = href.substring(1);
            window.location.hash = slug;
            loadNoteBySlug(slug);
          };
        }
      });
    }

    function extractHeadings(content) {
      const regex = /^(#{1,6})\s+(.+)$/gm;
      let match;
      let headings = [];
      while ((match = regex.exec(content)) !== null) {
        headings.push({ level: match[1].length, text: match[2] });
      }
      return headings;
    }

    function renderToc(headings) {
      const tocContainer = document.getElementById('tocContainer');
      const tocList = document.getElementById('tocList');
      if (!headings || headings.length === 0) {
        tocContainer.classList.add('hidden');
        return;
      }
      tocContainer.classList.remove('hidden');
      tocList.innerHTML = headings.map(h => `<li style="margin-left: ${(h.level - 1) * 10}px;">- ${escapeHtml(h.text)}</li>`).join('');
    }

    function openEditor() {
      document.getElementById('editId').value = '';
      document.getElementById('formTitle').value = '';
      document.getElementById('formSlug').value = '';
      document.getElementById('formContent').value = '';

      document.getElementById('listView').classList.add('hidden');
      document.getElementById('detailView').classList.add('hidden');
      document.getElementById('editView').classList.remove('hidden');
    }

    function switchToEdit() {
      if (!currentNote) return;
      document.getElementById('editId').value = currentNote.id;
      document.getElementById('formTitle').value = currentNote.title;
      document.getElementById('formSlug').value = currentNote.slug;
      document.getElementById('formContent').value = currentNote.content;

      document.getElementById('listView').classList.add('hidden');
      document.getElementById('detailView').classList.add('hidden');
      document.getElementById('editView').classList.remove('hidden');
    }

    // スマホで簡単に折り畳み式見出し（detailsタグ）を挿入する関数
    function insertDetailsTag() {
      const textarea = document.getElementById('formContent');
      const snippet = '\n<details>\n  <summary>見出しタイトル</summary>\n  <p>ここに折り畳まれる長い文章を入力...</p>\n</details>\n';
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      textarea.value = textarea.value.substring(0, start) + snippet + textarea.value.substring(end);
      textarea.focus();
      textarea.setSelectionRange(start + 11, start + 21); // 「見出しタイトル」を選択状態にする
    }

    function cancelEdit() {
      if (currentNote) {
        loadNoteBySlug(currentNote.slug);
      } else {
        showListView();
      }
    }

    async function saveNote() {
      const id = document.getElementById('editId').value;
      const title = document.getElementById('formTitle').value.trim();
      const slug = document.getElementById('formSlug').value.trim();
      const content = document.getElementById('formContent').value;
      const headings = extractHeadings(content);

      if (!title || !slug || !content) {
        alert('タイトル、スラッグ、本文はすべて必須です。');
        return;
      }

      const payload = { title, slug, content, headings };
      let error;

      if (id) {
        const res = await supabaseClient.from('notes').update(payload).eq('id', id);
        error = res.error;
      } else {
        const res = await supabaseClient.from('notes').insert([payload]);
        error = res.error;
      }

      if (error) {
        alert('保存エラー: ' + error.message);
        return;
      }

      window.location.hash = slug;
      await loadNotes();
      loadNoteBySlug(slug);
    }

    function setupRealtimeSync() {
      supabaseClient
        .channel('public:notes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'notes' }, async payload => {
          await loadNotes();
          if (currentNote && payload.new && payload.new.id === currentNote.id) {
            loadNoteBySlug(payload.new.slug);
          }
        })
        .subscribe();
    }

    function escapeHtml(str) {
      return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
  </script>
</body>
</html>
